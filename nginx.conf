server {
    listen 80;
    server_name app.portalph.tech;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name app.portalph.tech;

    ssl_certificate /etc/letsencrypt/live/app.portalph.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.portalph.tech/privkey.pem;

    # CORS para Capacitor Android (Abril 2026)
    set $cors_origin "";
    if ($http_origin ~* (https?://localhost|capacitor://localhost)) {
        set $cors_origin $http_origin;
    }

    location / {
        # Manejo de Preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Conectar con el contenedor backend (Django)
        proxy_pass http://127.0.0.1:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers CORS para peticiones normales
        add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
    }

    location /static/ {
        alias /opt/finanzas-backend/backend/staticfiles/;
    }

    location /media/ {
        alias /opt/finanzas-backend/backend/media/;
    }
}
